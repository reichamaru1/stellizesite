<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!--
    Stellize line icons
    ローダーのロゴ線画（round linecap の細ストローク）とトーンを揃えた 24x24 のラインアイコン。
    使い方: <svg class="icon" aria-hidden="true"><use href="assets/icons.svg#i-check"/></svg>
    色は currentColor を継承。
  -->
  <defs>
    <g id="_stroke" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </defs>

  <symbol id="i-check" viewBox="0 0 24 24">
    <path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="i-x" viewBox="0 0 24 24">
    <path d="M6.5 6.5l11 11M17.5 6.5l-11 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="i-lightbulb" viewBox="0 0 24 24">
    <path d="M12 3a6 6 0 0 1 6 6c0 2.2-1.2 3.6-2.4 4.8-.7.7-1.1 1.4-1.1 2.2h-5c0-.8-.4-1.5-1.1-2.2C7.2 12.6 6 11.2 6 9a6 6 0 0 1 6-6z M10 19.5h4 M10.5 22h3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="i-sprout" viewBox="0 0 24 24">
    <path d="M12 21v-7 M12 14c-.2-3.2-2.7-5.6-6-5.9.3 3.3 2.7 5.7 6 5.9z M12 12.5c.2-2.8 2.4-5 5.5-5.2-.2 2.9-2.4 5.1-5.5 5.2z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="i-target" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
  </symbol>

  <symbol id="i-globe" viewBox="0 0 24 24">
